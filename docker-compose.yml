# agent-chat — full stack: frontend + backend gateway + mcp orchestrator.
# Start everything with:  make up   (or: docker compose up -d --build)
name: agent-chat

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-agent}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-agent}"
      POSTGRES_DB: "${POSTGRES_DB:-agent_chat}"
    volumes:
      # LangGraph thread checkpoints (conversation history + stored PDF text).
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agent} -d ${POSTGRES_DB:-agent_chat}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [agentnet]
    restart: unless-stopped

  mcp:
    build:
      context: ./mcp
    image: agent-chat/mcp
    ports:
      - "${MCP_PORT:-8100}:8100"
    environment:
      # Single real-LLM key for all agents (no mock fallback) — fail early if unset.
      GEMMA_API_KEY: "${GEMMA_API_KEY:?GEMMA_API_KEY is required (see .env.example)}"
      # Per-sub-agent budget (real gemma calls over full documents/images).
      ORCHESTRATOR_SUBAGENT_TIMEOUT_S: "${ORCHESTRATOR_SUBAGENT_TIMEOUT_S:-120}"
      # Thread memory: LangGraph AsyncPostgresSaver checkpointer.
      ORCHESTRATOR_DATABASE_URL: "postgresql://${POSTGRES_USER:-agent}:${POSTGRES_PASSWORD:-agent}@postgres:5432/${POSTGRES_DB:-agent_chat}"
      # LangSmith tracing for ALL agents (orchestrator + stdio sub-agents inherit
      # this env). Optional — tracing stays off when unset (see .env.example).
      LANGSMITH_TRACING: "${LANGSMITH_TRACING:-false}"
      LANGSMITH_API_KEY: "${LANGSMITH_API_KEY:-}"
      LANGSMITH_ENDPOINT: "${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}"
      LANGSMITH_PROJECT: "${LANGSMITH_PROJECT:-gemma-chat}"
    volumes:
      # Chat attachments saved by the gateway; sub-agents read them by path.
      - uploads:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks: [agentnet]
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    image: agent-chat/backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      GATEWAY_HOST: "0.0.0.0"
      GATEWAY_PORT: "8000"
      GATEWAY_CORS_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000"]'
      # The gateway always routes through the mcp service in the composed stack.
      GATEWAY_ORCHESTRATOR_MODE: "http"
      GATEWAY_ORCHESTRATOR_MCP_URL: "http://mcp:8100/mcp"
      # Total budget: planner + slowest sub-agent + synthesis.
      GATEWAY_ORCHESTRATOR_TIMEOUT_S: "${GATEWAY_ORCHESTRATOR_TIMEOUT_S:-180}"
      GATEWAY_UPLOAD_DIR: "/data/uploads"
    volumes:
      - uploads:/data/uploads
    depends_on: [mcp]
    networks: [agentnet]
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    image: agent-chat/frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NODE_ENV: "production"
      # Backend is reached from the user's browser on the host, hence localhost.
      NEXT_PUBLIC_API_BASE_URL: "${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}"
    depends_on: [backend]
    networks: [agentnet]
    restart: unless-stopped

networks:
  agentnet:
    driver: bridge

volumes:
  uploads:
  pgdata:
